<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behind the doors</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='40' r='20' fill='%23222'/><polygon points='40,55 60,55 55,85 45,85' fill='%23222'/></svg>">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container"></div>

    <!-- UI Overlays -->
    <div id="blocker">
        <div id="instructions">
            <h1 class="title">Behind the doors</h1>
            <p>
                Click to play<br /><br />
                Move: WASD<br />
                Look: Mouse<br />
                Interact: Click (when Reticle indicates)<br />
                Flashlight: F<br />
            </p>
        </div>
    </div>

    <!-- Reticle for interacting with objects -->
    <div id="reticle"></div>

    <!-- Interaction Prompt -->
    <div id="interaction-prompt" class="hidden">
        [ Click to Examine ]
    </div>

    <!-- Dialogue / Narrative Box -->
    <div id="dialogue-container" class="hidden">
        <p id="dialogue-text"></p>
        <span class="blinking-cursor">_</span>
    </div>

    <!-- Countdown Timer -->
    <div id="timer-container" class="hidden">
        <span id="timer-text">30.00</span>
    </div>

    <!-- Inventory / Found Items -->
    <div id="inventory-container">
        <!-- Items added dynamically -->
    </div>

    <!-- Keypad UI -->
    <div id="keypad-container" class="hidden">
        <div id="keypad-panel">
            <h2>ENTER CODE</h2>
            <input type="text" id="keypad-input" maxlength="4" autocomplete="off" readonly>
            <div class="keypad-grid">
                <button class="key-btn">1</button><button class="key-btn">2</button><button class="key-btn">3</button>
                <button class="key-btn">4</button><button class="key-btn">5</button><button class="key-btn">6</button>
                <button class="key-btn">7</button><button class="key-btn">8</button><button class="key-btn">9</button>
                <button class="key-btn" id="key-clear">C</button><button class="key-btn">0</button><button
                    class="key-btn" id="key-enter">E</button>
            </div>
            <p id="keypad-error" class="hidden">INCORRECT</p>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over" class="hidden">
        <h1 class="blood-text">YOU DIED</h1>
        <p>They found you in the dark...</p>
        <button id="restart-btn" onclick="window.location.reload()">TRY AGAIN</button>
    </div>

    <!-- External Libs -->
    <!-- Import Map for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <!-- Load GSAP for animations (optional but good for smooth UI transitions) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <!-- Main Game Logic -->
    <script type="module" src="js/main.js"></script>
</body>

</html>
